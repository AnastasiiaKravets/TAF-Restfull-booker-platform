[tool.pytest.ini_options]

addopts = "--alluredir allure-results --junit-xml=reports/pytest-report.xml"
#junit_suite_name = "reports"

# --headed
#generate_report_on_test = true

#addopts = "--headed --tracing retain-on-failure -n 3"
#--html=report.html --self-contained-html

#from shell debug mode
#$env:PWDEBUG=1
#pytest -s -k test_name

#tracing
#playwright show-trace trace.zip
markers = [
    "api:          pure HTTP/API tests",
    "ui:           browser UI component tests",
    "gate:         blocks deploy; must pass before merge",
    "quarantine:   known broken; tracked with expiry; never blocks CI",
    "smoke:        fastest critical subset of gate; target <2 min",
    "regression:   full suite; run nightly",
    "slow:         >10s; excluded from fast runs",
    "serial:       cannot run in parallel; use -n0",
    "wip:          in progress; excluded from all CI runs",
]