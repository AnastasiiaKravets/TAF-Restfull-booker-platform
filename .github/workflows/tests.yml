name: Tests & Allure Report

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    env:
      ENV: staging
      BASE_API_URL: ${{ vars.BASE_API_URL }}
      BASE_UI_URL: ${{ vars.BASE_UI_URL }}
      BROWSER: chromium
      AUTH_KEY: ${{ secrets.AUTH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

#      - name: Install Playwright browsers
#        run: playwright install --with-deps chromium

#      - name: Install Allure 3 CLI
#        run: npm install -g @allurereport/cli

      - name: Run API gate
        run: pytest -m api
        continue-on-error: true

# Get previous report history
      - name: Get Allure history
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Generate report
      - name: Generate Allure Report
        uses: allure-framework/allure-action@v1
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history