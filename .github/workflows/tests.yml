name: Tests & Allure Report

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: write

jobs:
  test:
    name: Run Tests & Publish Reports
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    env:
      ENV: staging
      BASE_API_URL: ${{ vars.BASE_API_URL }}
      BASE_UI_URL: ${{ vars.BASE_UI_URL }}
      BROWSER: chromium
      AUTH_KEY: ${{ secrets.AUTH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run API tests
        run: pytest -m api
        continue-on-error: true

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          python - <<'EOF' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse("reports/pytest-report.xml")
              ts = tree.getroot().find("testsuite") or tree.getroot()
              attrs = ts.attrib
              total  = attrs.get("tests", "?")
              errors = attrs.get("errors", "0")
              fails  = attrs.get("failures", "0")
              skip   = attrs.get("skipped", "0")
              passed = int(total or 0) - int(fails) - int(errors) - int(skip)
              print(f"| Tests | Passed | Failed | Errors | Skipped |")
              print(f"|-------|--------|--------|--------|---------|")
              print(f"| {total} | {passed} | {fails} | {errors} | {skip} |")
          except Exception as e:
              print(f"Could not parse report: {e}")
          EOF

      - name: Publish Pytest Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Pytest Results
          path: reports/pytest-report.xml
          reporter: java-junit

      - name: Upload allure-results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 3

      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-html-report
          path: reports/report.html
          retention-days: 14

      - name: Purge Old Artifacts
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const artifactName = 'pytest-html-report';
            const keepRecent = 5;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: artifactName,
              per_page: 100,
            });
            const sorted = artifacts.data.artifacts.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            const toDelete = sorted.slice(keepRecent);
            for (const artifact of toDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name} (id: ${artifact.id})`);
            }

  publish-allure:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'skipped'
    timeout-minutes: 10

    steps:
      - name: Download allure-results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Cache Allure CLI
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: allure-cli-${{ runner.os }}

      - name: Install Allure CLI
        run: |
          npm config set prefix ~/.npm-global
          npm install -g allure
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          sparse-checkout: history.jsonl
          sparse-checkout-cone-mode: false

      - name: Restore history file
        run: |
          mkdir -p allure-report
          if [ -f gh-pages/history.jsonl ]; then
            cp gh-pages/history.jsonl allure-report/history.jsonl
          fi
        continue-on-error: true

      - name: Generate Allure Report
        run: allure generate allure-results --output allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true
